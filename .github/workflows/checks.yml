name: ✅ PR checks (quality gate)

on:
  pull_request:

permissions:
  contents: read

jobs:
  backend:
    name: 🐍 Backend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Install deps
        run: uv sync --group dev

      - name: Ruff (lint)
        run: uv run ruff check .

      - name: Ruff (format check)
        run: uv run ruff format --check .

      - name: Ty
        run: uv run ty check apps/backend/fathom

      - name: Backend tests
        run: ./.venv/bin/python -m unittest discover -s apps/backend/tests -t apps/backend

  frontend:
    name: 🌐 Frontend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10
          cache: true
          cache_dependency_path: pnpm-lock.yaml

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Install deps
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm --filter @fathom/web lint

      - name: Typecheck
        run: pnpm --filter @fathom/web typecheck

      - name: Build
        run: pnpm --filter @fathom/web build
