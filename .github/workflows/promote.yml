name: 🚀 Promote to prod

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release tag to promote. Leave empty to promote the latest v*.*.* tag."
        required: false
        type: string

permissions:
  contents: read

concurrency:
  group: promotion-prod
  cancel-in-progress: false

jobs:
  resolve:
    name: 🧭 Resolve release
    runs-on: ubuntu-latest
    outputs:
      ref: ${{ steps.resolve.outputs.ref }}
      tag: ${{ steps.resolve.outputs.tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Resolve target release
        id: resolve
        env:
          INPUT_TAG: ${{ inputs.release_tag }}
        run: |
          set -euo pipefail

          tag="${INPUT_TAG}"
          if [[ -z "$tag" ]]; then
            tag="$(git tag --list 'v*.*.*' --sort=-version:refname | head -n 1)"
          fi

          if [[ -z "$tag" ]]; then
            echo "No release tag available to promote."
            exit 1
          fi

          if ! git rev-parse --verify "${tag}^{tag}" >/dev/null 2>&1; then
            echo "Unknown release tag: ${tag}"
            exit 1
          fi

          echo "ref=${tag}" >> "$GITHUB_OUTPUT"
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"

  supabase:
    name: 🗄️ Deploy Supabase migrations to prod
    needs: resolve
    runs-on: ubuntu-latest
    environment: prod

    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}

    steps:
      - name: Checkout promoted release
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.resolve.outputs.ref }}

      - name: Set up Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link Supabase project (prod)
        run: supabase link --project-ref "$SUPABASE_PROJECT_REF"

      - name: Deploy migrations (prod)
        run: |
          supabase db push --dry-run
          supabase --yes db push
