name: 📦 Release on main

on:
  push:
    branches: ["main"]

permissions:
  contents: write
  pull-requests: read

concurrency:
  group: release-main
  cancel-in-progress: false

jobs:
  release:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    env:
      RELEASE_AUTOMATION_TOKEN: ${{ secrets.RELEASE_AUTOMATION_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ env.RELEASE_AUTOMATION_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Install deps
        run: uv sync --group dev

      - name: Collect merged PR commits
        uses: actions/github-script@v9
        with:
          script: |
            const fs = require("node:fs");

            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const commitSha = context.sha;

            const { data: pulls } = await github.rest.repos.listPullRequestsAssociatedWithCommit({
              owner,
              repo,
              commit_sha: commitSha,
            });

            const mergedPull = pulls.find((pull) => pull.base.ref === "main" && pull.merged_at) ?? null;
            const payload = {
              pull_request: mergedPull
                ? {
                    number: mergedPull.number,
                    title: mergedPull.title,
                    url: mergedPull.html_url,
                  }
                : null,
              commits: [],
              changed_files: [],
            };

            if (mergedPull) {
              const commits = await github.paginate(github.rest.pulls.listCommits, {
                owner,
                repo,
                pull_number: mergedPull.number,
                per_page: 100,
              });

              payload.commits = commits.map((commit) => ({
                sha: commit.sha,
                message: commit.commit.message,
                is_merge_commit: commit.parents.length > 1,
              }));

              const files = await github.paginate(github.rest.pulls.listFiles, {
                owner,
                repo,
                pull_number: mergedPull.number,
                per_page: 100,
              });
              payload.changed_files = files.map((file) => file.filename);
            } else {
              const pushCommits = context.payload.commits ?? [];
              payload.commits = pushCommits.map((commit) => ({
                sha: commit.id,
                message: commit.message,
                is_merge_commit: false,
              }));
              payload.changed_files = [
                ...new Set(
                  pushCommits.flatMap((commit) => [
                    ...(commit.added ?? []),
                    ...(commit.modified ?? []),
                    ...(commit.removed ?? []),
                  ])
                ),
              ];
            }

            if (payload.commits.length === 0) {
              const headCommit = context.payload.head_commit;
              if (headCommit?.message) {
                payload.commits = [
                  {
                    sha: headCommit.id ?? commitSha,
                    message: headCommit.message,
                    is_merge_commit: false,
                  },
                ];
              }
            }

            fs.mkdirSync(".github/tmp", { recursive: true });
            fs.writeFileSync(".github/tmp/release-commits.json", JSON.stringify(payload, null, 2));

      - name: Compute release files
        id: release
        run: python .github/scripts/release.py --commits-file .github/tmp/release-commits.json

      - name: Update lockfile
        if: steps.release.outputs.released == 'true'
        run: uv lock

      - name: Commit release
        if: steps.release.outputs.released == 'true'
        env:
          VERSION: ${{ steps.release.outputs.version }}
          RELEASE_AUTOMATION_TOKEN: ${{ env.RELEASE_AUTOMATION_TOKEN }}
        run: |
          set -euo pipefail

          if [[ -z "${RELEASE_AUTOMATION_TOKEN}" ]]; then
            echo "RELEASE_AUTOMATION_TOKEN is not configured."
            exit 1
          fi

          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git remote set-url origin "https://x-access-token:${RELEASE_AUTOMATION_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"

          git add CHANGELOG.md pyproject.toml uv.lock

          if git diff --cached --quiet; then
            echo "No release changes to commit."
            exit 0
          fi

          git commit -m "chore(release): v${VERSION} [skip ci]"
          git tag -a "v${VERSION}" -m "Release v${VERSION}"
          git push origin HEAD:main --follow-tags

      - name: Publish GitHub release
        if: steps.release.outputs.released == 'true'
        uses: softprops/action-gh-release@v3
        with:
          tag_name: v${{ steps.release.outputs.version }}
          body_path: .github/tmp/release-notes.md
