name: 🚧 Staging

on:
  workflow_run:
    workflows: ["📦 Release on main"]
    types: [completed]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: staging
  cancel-in-progress: false

jobs:
  changes:
    if: github.event_name == 'workflow_dispatch' || (github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'main')
    runs-on: ubuntu-latest
    outputs:
      supabase: ${{ steps.filter.outputs.supabase }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}

      - name: Detect Supabase changes
        id: filter
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            echo "supabase=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if ! git rev-parse HEAD^ >/dev/null 2>&1; then
            echo "supabase=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if git diff --quiet HEAD^ HEAD -- supabase; then
            echo "supabase=false" >> "$GITHUB_OUTPUT"
          else
            echo "supabase=true" >> "$GITHUB_OUTPUT"
          fi

  supabase:
    name: 🗄️ Deploy Supabase migrations to staging
    needs: changes
    if: needs.changes.outputs.supabase == 'true'
    runs-on: ubuntu-latest
    environment: staging

    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}

      - name: Set up Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link Supabase project (staging)
        run: supabase link --project-ref "$SUPABASE_PROJECT_REF"

      - name: Deploy migrations (staging)
        run: |
          supabase db push --dry-run
          supabase --yes db push
